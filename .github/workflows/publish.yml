name: Publish to npm and GitHub Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to upload release assets
      id-token: write  # Needed for npm provenance

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'  # Required for npm trusted publishing (>=24)
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: get_version
        run: |
          # Remove 'v' prefix from tag (e.g., v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Update package.json version
        run: |
          npm version ${{ steps.get_version.outputs.version }} --no-git-tag-version
          echo "Updated package.json to version ${{ steps.get_version.outputs.version }}"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Publish to npm (Trusted Publishing with OIDC)
        run: npm publish --provenance --access public

      - name: Upload browser bundle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            ./dist/index.browser.js \
            ./dist/index.browser.js.map \
            --clobber

      - name: Update release with CDN links
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.get_version.outputs.version }}';
            const packageName = 'streaming-hls-parser';
            const currentBody = context.payload.release.body || '';

            const separator = '\n\n___\n\n';
            const cdnInfo = separator + '## 📦 Published to npm!\n\n' +
              '### Installation\n' +
              '```bash\n' +
              'npm install ' + packageName + '@' + version + '\n' +
              '```\n\n' +
              '### CDN Links\n\n' +
              '**jsDelivr:**\n' +
              '```html\n' +
              '<script type="module">\n' +
              '  import { HLS } from \'https://cdn.jsdelivr.net/npm/' + packageName + '@' + version + '/dist/index.browser.js\';\n' +
              '</script>\n' +
              '```\n\n' +
              '**unpkg:**\n' +
              '```html\n' +
              '<script type="module">\n' +
              '  import { HLS } from \'https://unpkg.com/' + packageName + '@' + version + '/dist/index.browser.js\';\n' +
              '</script>\n' +
              '```\n\n' +
              '**GitHub Release Assets:**\n' +
              'Browser bundle and source map are attached to this release as assets.\n\n' +
              '_Note: CDNs typically sync within 5-10 minutes of npm publication._';

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: currentBody + cdnInfo
            });
